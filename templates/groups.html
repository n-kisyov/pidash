{% extends "base.html" %}
{% block title %}pidash - Groups{% endblock %}
{% block content %}

<div class="row mb-3 align-items-end">
    <div class="col-md-3">
        <label class="form-label">Pi-hole Instance</label>
        <select class="form-select" id="groups-instance-select">
            <option value="">Loading...</option>
        </select>
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addGroupModal">
            <i class="bi bi-plus-lg"></i> Add Group
        </button>
    </div>
    <div class="col-md-7">
        <div id="groups-status" class="text-muted small mt-2"></div>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Enabled</th>
                        <th>Comment</th>
                        <th>Date Added</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="groups-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addGroupModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Group</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="add-group-form">
                    <div class="mb-3">
                        <label class="form-label">Group Name</label>
                        <input type="text" class="form-control" name="name" required
                            placeholder="e.g. Kids, Parents">
                        <div class="form-text">Enter multiple names separated by commas to create several groups at once.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Comment</label>
                        <input type="text" class="form-control" name="comment" placeholder="Optional description">
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="enabled" checked value="true" id="cb-group-add-enabled">
                            <label class="form-check-label" for="cb-group-add-enabled">Enabled</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveGroup()">Add Group</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editGroupModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Group</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="edit-group-form">
                    <input type="hidden" name="name">
                    <div class="mb-3">
                        <label class="form-label">Group Name</label>
                        <input type="text" class="form-control" name="new_name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Comment</label>
                        <input type="text" class="form-control" name="comment">
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="enabled" id="cb-group-edit-enabled">
                            <label class="form-check-label" for="cb-group-edit-enabled">Enabled</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateGroup()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/groups.js') }}"></script>
{% endblock %}
