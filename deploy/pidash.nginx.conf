# pidash nginx configuration
# Place in /etc/nginx/sites-available/pidash and symlink to sites-enabled.
#
# For HTTPS: run `certbot --nginx -d pidash.example.com` after the domain
# is pointed and this config is in place.

upstream pidash_backend {
    server 127.0.0.1:8080 fail_timeout=0;
}

server {
    listen 80;
    server_name pidash.example.com;

    client_max_body_size 10m;

    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://pidash_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

}
